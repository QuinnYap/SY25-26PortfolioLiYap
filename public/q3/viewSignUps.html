    <body>
        <header>
            <div>
                <img style="float:left;" src="../../asset/BadgeOriginalDefinition.png" alt = "Japanese attorney's badge" title = "Quinn's Attorney's Badge">
                <h1>ᵕ̈View Club Sign Ups☕︎</h1>
                <p style="color:var(--platinum); font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif">by YAP, Quinn Mikayela C. of 9-Lithium</p>

        <section>
            <div id="dropdown">
                <p>
                <label>
                    Select Your Club:
                    <select name="seeclub" id="seeclub" onchange="viewSignUps()">
                        <option value="Select">--select a club--</option>
                        <option value="All">All</option>
                        <option value="Art Club">Arts & Crafts</option>
                        <option value="Dance Club">Dance</option>
                        <option value="Singing Club">Choir</option>
                        <option value="Music Club">Music</option>
                        <option value="Theatre Club">Theatre</option>
                        <option value="Ultimate Frisbee Club">Ultimate Frisbee</option>
                    </select>
                </label>
                </p>
                <p id="totalsignups"> </p>
            </div>
            <div id="table">
                <table id="listees"></table>
            </div>
        </section>
    </body>

    <script>
        const LIST = "signUps";
        let listString = localStorage.getItem(LIST);
        let hasSignUps = false
        if(!listString){
            listSignUps = "No sign ups found"
        }
        else{
            hasSignUps= true
            }

        function viewSignUps(){
            let rowString = "<tr><th>ID</th><th>Name</th><th>Email</th><th>Grade Level</th><th>Intern/Extern</th><th>Club</th></tr>";
            let signCount = 0;
            const clubChose = seeclub.value;
            console.log(listSignUps)
            for (let key in listSignUps) {
                if(listSignUps[key].clubSelect == clubChose){
                        rowString += "<tr>";
                        rowString += "<td>" + key + "</td>";
                        rowString += "<td>" + listSignUps[key].fullname + "</td>";
                        rowString += "<td>" + listSignUps[key].emailadd + "</td>";
                        rowString += "<td>" + listSignUps[key].grlevel + "</td>";
                        rowString += "<td>" + listSignUps[key].intext + "</td>";
                        rowString += "<td>" + listSignUps[key].clubSelect + "</td></tr>";
                        signCount += 1;
                        }
                else if(clubChose == "All"){
                        rowString += "<tr>";
                        rowString += "<td>" + key + "</td>";
                        rowString += "<td>" + listSignUps[key].fullname + "</td>";
                        rowString += "<td>" + listSignUps[key].emailadd + "</td>";
                        rowString += "<td>" + listSignUps[key].grlevel + "</td>";
                        rowString += "<td>" + listSignUps[key].intext + "</td>";
                        rowString += "<td>" + listSignUps[key].clubSelect + "</td></tr>";
                        signCount += 1;
                    }
            }
            if(signCount == 0){
                listees.innerHTML = "No Sign Ups for This Club"
            }
            else{
                listees.innerHTML = rowString;
                totalsignups.innerHTML = "Total sign ups: " + signCount;
            }
        }

        if(hasSignUps){
            listSignUps = JSON.parse(listString) // converts string into the correct data type in this case object
            chosenClub();
        }

    </script>
