    <body>
        <header>
            <div>
                <img style="float:left;" src="../../asset/BadgeOriginalDefinition.png" alt = "Japanese attorney's badge" title = "Quinn's Attorney's Badge">
                <h1>ᵕ̈View Club Sign Ups☕︎</h1>
                <p style="color:var(--platinum); font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif">by YAP, Quinn Mikayela C. of 9-Lithium</p>
            </div>
        </header>
        <nav>
            <a href="Q3_2&3GLithiumYap.html">Back to Sign-Up</a>
        </nav>
        <section>
            <div>
                <label>
                    Select your club: 
                    <select id="clubType">
                        <option value="selectIt">--select a club--</option>
                        <option value="all">All</option>
                        <option value="artcl">Arts & Crafts</option>
                        <option value="dancecl">Dance</option>
                        <option value="singcl">Choir</option>
                        <option value="musiccl">Music</option>
                        <option value="theatrecl">Theatre</option>
                        <option value="ultfrisbeecl">Ultimate Frisbee</option>
                    </select>
                </label>
                <button onclick="getSignUps()">Get sign-ups</button>
                <p id="totalSignUps">Total Sign Ups: </p>
            </div>
            <div>
                <table id="signees"> </table>
            </div>
        </section>
    </body>

    <script>
        let signUps = localStorage.getItem("signUpPpl")
        if (!signUps) { signErs = "No Sign-Ups Found" } 
        else {
            
            signErs = JSON.parse(signUps) 
            rowString = "<tr><th>Student ID</th><th>Club</th><th>Full Name</th><th>Grade</th><th>Email</th><th>Mobile no.</th><th>Why Join?</th></tr>";
            for(let ppl in signErs){
                rowString += "<tr>";
                rowString += "<td>" + ppl + "</td>";
                rowString += "<td>" + signErs[ppl].clubSelect + "</td>";
                rowString += "<td>" + signErs[ppl].fullname + "</td>";
                rowString += "<td>" + signErs[ppl].grlevel + "</td>";
                rowString += "<td>" + signErs[ppl].emailadd + "</td>";
                rowString += "<td>" + signErs[ppl].mobphone + "</td>";
                rowString += "<td>" + signErs[ppl].why + "</td></tr>";
            }
        }
        signees.innerHTML = rowString;
    </script>
